name: Keep Render Service Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error "https://shl-assignment-s3kp.onrender.com/health" > /dev/null

      - name: Ping lightweight chat endpoint
        run: |
          curl --fail --silent --show-error \
            -X POST "https://shl-assignment-s3kp.onrender.com/chat" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"Need quick assessment guidance."}]}' > /dev/null
